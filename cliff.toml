# git-cliff configuration for fmd (Frappe Manager Deployer)
# See https://git-cliff.org/docs/configuration for details

[changelog]
# Changelog header
header = """
# Changelog\n
All notable changes to fmd (Frappe Manager Deployer) will be documented in this file.\n
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
          {% if commit.breaking %} [**BREAKING**]{% endif %}
    {% endfor %}
{% endfor %}\n
"""

# Template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""

# Remove the leading and trailing whitespace from the template
trim = true

[git]
# Parse commits based on conventional commit style
conventional_commits = true
# Filter out commits that are not conventional
filter_unconventional = false
# Process each line of the commit as an individual commit
split_commits = false
# Regex for preprocessing commit messages
commit_preprocessors = [
    # Replace issue numbers with links
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/rtcamp/fmd/issues/${2}))" },
    # Remove gitmoji
    { pattern = ':\w+:', replace = "" },
]
# Regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI/CD" },
    { message = "^build", group = "Build System" },
    { message = "^revert", group = "Reverts" },
    # Catch-all for commits without conventional format
    { message = ".*", group = "Other" },
]
# Protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# Filter out commits that are not matched by commit parsers
filter_commits = false
# Regex for matching git tags
tag_pattern = "v[0-9].*"
# Sort tags chronologically
date_order = false
# Sort commits inside sections by oldest/newest order
sort_commits = "oldest"
# Limit the number of commits included in the changelog
# limit_commits = 42
