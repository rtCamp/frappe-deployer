name: "Frappe Deployer Action"
description: "Deploy Frappe using frappe-deployer"
branding:
  icon: "upload-cloud"
  color: "blue"
inputs:
  command:
    description: "Command to run (pull or ship)"
    required: false
    default: "pull"
  sitename:
    description: "Site name"
    required: false

  # 'pull' + 'ship' shared switch inputs
  drain_workers:
    description: "Drain workers before restart"
    required: false
    default: "false"
  drain_workers_timeout:
    description: "Timeout in seconds to wait for workers to drain"
    required: false
    default: "300"
  drain_workers_poll:
    description: "Poll interval in seconds while draining workers"
    required: false
    default: "5"
  skip_stale_workers:
    description: "Skip stale workers when draining"
    required: false
    default: "true"
  skip_stale_timeout:
    description: "Timeout in seconds to consider a worker stale"
    required: false
    default: "15"
  migrate:
    description: "Run bench migrate after switch"
    required: false
    default: "true"
  migrate_timeout:
    description: "Timeout in seconds for bench migrate"
    required: false
    default: "300"
  migrate_command:
    description: "Custom migrate command override"
    required: false
  maintenance_mode_phases:
    description: "Maintenance mode phases: space-separated list of 'drain' and/or 'migrate'"
    required: false
    default: ""
  worker_kill_timeout:
    description: "Timeout in seconds before force-killing workers"
    required: false
    default: "15"
  worker_kill_poll:
    description: "Poll interval in seconds while waiting to kill workers"
    required: false
    default: "3.0"
  additional_commands:
    description: "Additional CLI flags to append to the fmd deploy command"
    required: false

  # SSH inputs — required for both 'pull' and 'ship' (remote server access)
  ssh_private_key:
    description: "SSH private key for the remote server. Required for 'pull' and 'ship' commands."
    required: false
  ssh_server:
    description: "SSH server hostname or IP. Required for 'pull' and 'ship' commands."
    required: false
  ssh_user:
    description: "SSH username on the remote server. Required for 'pull' and 'ship' commands."
    required: false
  ssh_port:
    description: "SSH port for the remote server."
    required: false
    default: "22"

  # 'ship'-specific inputs
  existing_release:
    description: "Re-use an already-created local release instead of building a new one. Format: release_YYYYMMDD_HHMMSS"
    required: false
  skip_rsync:
    description: "Skip the rsync step (useful when the release is already on the remote server)"
    required: false
    default: "false"
  runner_image:
    description: "Docker image used to build the release in image mode. Overrides auto-detection."
    required: false

  # Common inputs
  gh_token:
    description: "A GitHub token for private repo access"
    required: true
  config_path:
    description: "Path to the frappe-deployer config file from repo root"
    required: false
  config_content:
    description: "TOML config string content"
    required: false
  app_env:
    description: |
      Per-app environment variables injected into fm_pre_build/fm_post_build scripts on the remote server.
      Format: one entry per line as `app-name:KEY=VALUE`, where app-name matches the last path segment of
      the app's repo (e.g. 'godam-core' for 'rtcamp/godam-core').
      All declared vars are available to every app's build scripts; the app-name prefix is for readability.
      Note: values must be single-line. For multiline content (e.g. a .env file), base64-encode the secret
      and decode inside fm_pre_build with: echo "${MY_VAR}" | base64 -d > path/to/.env
    required: false

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Create temporary directory
      id: temp_dir
      shell: bash
      run: echo "path=$(mktemp -d)" >> $GITHUB_OUTPUT

    - name: Install uv
      shell: bash
      run: |
        mkdir -p ${{ steps.temp_dir.outputs.path }}/.bin
        export UV_INSTALL_DIR=${{ steps.temp_dir.outputs.path }}/.bin
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "${{ steps.temp_dir.outputs.path }}/.bin" >> $GITHUB_PATH

    - name: Install frappe-deployer
      shell: bash
      working-directory: ${{ steps.temp_dir.outputs.path }}
      run: |
        uv venv --python 3.10
        uv pip install ${{ github.action_path }}

    - name: Run frappe-deployer
      shell: bash
      working-directory: ${{ steps.temp_dir.outputs.path }}
      run: |
        source .venv/bin/activate && ${{ github.action_path }}/scripts/deploy.sh
      env:
        CI: true
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_SITENAME: ${{ inputs.sitename }}
        INPUT_DRAIN_WORKERS: ${{ inputs.drain_workers }}
        INPUT_DRAIN_WORKERS_TIMEOUT: ${{ inputs.drain_workers_timeout }}
        INPUT_DRAIN_WORKERS_POLL: ${{ inputs.drain_workers_poll }}
        INPUT_SKIP_STALE_WORKERS: ${{ inputs.skip_stale_workers }}
        INPUT_SKIP_STALE_TIMEOUT: ${{ inputs.skip_stale_timeout }}
        INPUT_MIGRATE: ${{ inputs.migrate }}
        INPUT_MIGRATE_TIMEOUT: ${{ inputs.migrate_timeout }}
        INPUT_MIGRATE_COMMAND: ${{ inputs.migrate_command }}
        INPUT_MAINTENANCE_MODE_PHASES: ${{ inputs.maintenance_mode_phases }}
        INPUT_WORKER_KILL_TIMEOUT: ${{ inputs.worker_kill_timeout }}
        INPUT_WORKER_KILL_POLL: ${{ inputs.worker_kill_poll }}
        INPUT_ADDITIONAL_COMMANDS: ${{ inputs.additional_commands }}
        INPUT_EXISTING_RELEASE: ${{ inputs.existing_release }}
        INPUT_SKIP_RSYNC: ${{ inputs.skip_rsync }}
        INPUT_RUNNER_IMAGE: ${{ inputs.runner_image }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        SSH_SERVER: ${{ inputs.ssh_server }}
        SSH_USER: ${{ inputs.ssh_user }}
        SSH_PORT: ${{ inputs.ssh_port }}
        FRAPPE_DEPLOYER_CONFIG_PATH: ${{ inputs.config_path }}
        FRAPPE_DEPLOYER_CONFIG_CONTENT: ${{ inputs.config_content }}
        FRAPPE_DEPLOYER_GITHUB_TOKEN: ${{ inputs.gh_token }}
        INPUT_APP_ENV: ${{ inputs.app_env }}

    - name: Clean up temporary directory
      if: always()
      shell: bash
      run: |
        docker run --rm --user root -v ${{ steps.temp_dir.outputs.path }}:/data alpine sh -c 'find /data -mindepth 1 -delete'
        rm -rf ${{ steps.temp_dir.outputs.path }}
